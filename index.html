        const grid = document.getElementById('tools-grid');
        
        toolNames.forEach((name, index) => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `<div class="tool-number">#${index + 1}</div><div style="font-size:0.8rem">${name}</div>`;
            card.onclick = () => startTimer(name);
            grid.appendChild(card);
        });

        function startTimer(toolName) {
            const overlay = document.getElementById('timer-overlay');
            const text = document.getElementById('timer-text');
            overlay.style.display = 'flex';
            let count = 10;
            
            const interval = setInterval(() => {
                count--;
                text.innerText = `جاري تحضير الرابط... ${count}`;
                if (count <= 0) {
                    clearInterval(interval);
                    overlay.style.display = 'none';
                    window.open(toolsData[toolName], '_blank');
                }
            }, 1000);
        }
