        .ad-banner { position: fixed; left: 0; width: 100%; height: 60px; background: #000; border: 1px solid var(--neon); display: flex; align-items: center; justify-content: center; z-index: 4000; font-weight: bold; color: var(--neon); font-size: 13px; }

        .container { padding: 15px; max-width: 1100px; margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { background: var(--glass); border: 1px solid rgba(0, 242, 254, 0.1); padding: 20px 10px; border-radius: 20px; cursor: pointer; transition: 0.3s; height: 110px; display: flex; flex-direction: column; justify-content: center; }

        .card b { color: var(--neon); font-size: 14px; }
        .card small { font-size: 10px; color: #aaa; margin-top: 5px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 5000; align-items: center; justify-content: center; }
        .modal-box { width: 90%; max-width: 450px; background: #111; padding: 30px; border-radius: 30px; border: 2px solid var(--neon); text-align: center; }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .btn-dl { background: var(--neon); color: black; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; display: none; margin-top: 15px; }

    for(let i=0; i<100; i++) {
        let name = keys[i] || "أداة تقنية #" + (i+1);
        let link = toolsData[name] || "https://play.google.com/store/search?q=" + name;
        grid.innerHTML += `
            <div class="card" onclick="startProcess('${name}', '${link}')">
                <b>#${i+1}</b>
                <small>${name}</small>
            </div>
        `;
    }

    function startProcess(name, link) {
        document.getElementById('t-name').innerText = name;
        document.getElementById('ad-box').href = MY_AD_LINK;
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('final-link').style.display = 'none';
        let p = 0;
        let bar = document.getElementById('fill');
        let interval = setInterval(() => {
            p += 2;
            bar.style.width = p + "%";
            if(p >= 100) {
                clearInterval(interval);
                document.getElementById('final-link').style.display = 'block';
                document.getElementById('final-link').href = link;
                document.getElementById('status-txt').innerText = "الرابط جاهز تماماً ✅";
            }
        }, 100);

    window.onclick = function(e) { if(e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; }
